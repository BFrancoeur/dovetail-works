name: dovetail-prod

services:
  app:
    build:
      context: .
      target: prod
    volumes:
      - media_uploads_prod:/app/public/media
    env_file: .env.prod
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_prod

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - internal_prod

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - internal_prod

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "8090:80"
      - "8453:443"
    depends_on:
      - app
    restart: always
    networks:
      - internal_prod

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data_prod:/vault/data
      - ./vault/config/vault.prod.hcl:/vault/config/vault.hcl:ro
    command: vault server -config=/vault/config/vault.hcl
    restart: unless-stopped
    networks:
      - internal_prod

volumes:
  pg_data_prod:
  redis_data_prod:
  media_uploads_prod:
  vault_data_prod:

networks:
  internal_prod:
    driver: bridge
